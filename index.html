<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Busters</title>

  <!-- Fuente pixelada de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <!-- Phaser 3 desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>

  <!-- Configuración y arranque del juego como módulos ES6 -->
  <script type="module">
    // Importar configuración
    import { CONSTANTS } from './src/config/constants.js';
    import { LEVELS } from './src/config/levels.js';

    // Importar managers
    import { AssetLoader } from './src/managers/AssetLoader.js';
    import { SoundManager } from './src/managers/SoundManager.js';
    import { ProgressManager } from './src/managers/ProgressManager.js';
    import { PowerManager } from './src/managers/PowerManager.js';
    import { HUDManager } from './src/managers/HUDManager.js';
    import { ScoreSystem } from './src/managers/ScoreSystem.js';

    // Importar escenas
    import { BootScene } from './src/scenes/BootScene.js';
    import { LoadingScene } from './src/scenes/LoadingScene.js';
    import { MainMenuScene } from './src/scenes/MainMenuScene.js';
    import { GameScene } from './src/scenes/GameScene.js';
    import { LevelCompleteScene } from './src/scenes/LevelCompleteScene.js';
    import { GameOverScene } from './src/scenes/GameOverScene.js';
    import { VictoryScene } from './src/scenes/VictoryScene.js';

    // Configuración principal de Phaser
    const config = {
      type: Phaser.AUTO,
      width: 800,
      height: 600,
      backgroundColor: '#000000',
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
      },
      scene: [
        BootScene,
        LoadingScene,
        MainMenuScene,
        GameScene,
        LevelCompleteScene,
        GameOverScene,
        VictoryScene
      ],
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      }
    };

    // Iniciar el juego
    const game = new Phaser.Game(config);
  </script>

</body>
</html>
